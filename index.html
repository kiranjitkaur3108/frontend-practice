<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | QR code component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap");
      :root {
        --white: hsl(0, 0%, 100%);
        --Slate300: hsl(212, 45%, 89%);
        --Slate500: hsl(216, 15%, 48%);
        --Slate900: hsl(218, 44%, 22%);
        --Fontsize: 15px;
      }

      body {
        background-color: var(--Slate300);
        height: 100vh;
        margin: 0;
      }
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        
      }
      .card {
        background-color: var(--white);
        
        /* display:flex;
        justify-content: center;
        align-items: center; */
        /* min-width:375px ;
        max-width:1440px; */
       box-shadow: 0px 10px 20px var(--Slate300);
        border-radius: 23px;
        /* height: 70vh; */
        padding: 20px;
        box-sizing: border-box;
        max-width: 320px;
        width:90%;
        text-align: center;
        font-family: "Outfit", sans-serif;
        font-optical-sizing: auto;
        font-style: normal;
      }
      img {
        /* min-width: 370px; */
        /* max-width:1435px; ; */

        
        border-radius: 23px;
        width: 100%;
        height: auto;
      }
      .heading {
        font-weight: 700;
        color: var(--Slate900);
      }
      .para {
        font-weight: 400;
        color: var(--Slate500);
        font-size: 15px;
      }
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
      /* Desktop */
@media (min-width: 768px){
   .card{
      width: 320px;
      padding: 20px;
   }
}
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <img src="images/image-qr-code.png" alt="qr_image" />
        <div class="heading">
          <h2>Improve your front-end skills by building projects</h2>
        </div>
        <div>
          <p class="para">
            Scan the QR code to visit Frontend Mentor and take your coding
            skills to the next level.
          </p>
        </div>
      </div>
    </div>
    <div>
      <footer class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a
        >. Coded by <a href="#">Kiran</a>.
      </footer>
    </div>
  </body>
</html>
